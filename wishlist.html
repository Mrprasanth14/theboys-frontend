<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your wishlist">
  <title>Wishlist - TheBoys Fashion Store</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/responsive.css">
  
  <style>
    .wishlist-page {
      padding: var(--spacing-xl) 0;
    }
    
    .wishlist-header {
      margin-bottom: var(--spacing-xl);
    }
    
    .empty-wishlist {
      text-align: center;
      padding: var(--spacing-2xl);
    }
    
    .empty-wishlist h2 {
      margin-bottom: var(--spacing-md);
    }
    
    .empty-wishlist p {
      color: var(--text-secondary);
      margin-bottom: var(--spacing-lg);
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="navbar-content">
      <a href="index.html" class="logo">TheBoys</a>
      
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html?category=men">Men</a></li>
        <li><a href="products.html?category=women">Women</a></li>
        <li><a href="products.html?category=kids">Kids</a></li>
        <li><a href="products.html">All Products</a></li>
      </ul>
      
      <div class="nav-actions">
        <button class="icon-btn" id="search-btn" aria-label="Search" onclick="window.location.href='search.html'">
          🔍
        </button>
        <button class="icon-btn" id="theme-toggle" aria-label="Toggle theme">
          🌙
        </button>
        <a href="wishlist.html" class="icon-btn" aria-label="Wishlist">
          ♡
        </a>
        <a href="cart.html" class="icon-btn" aria-label="Cart">
          🛒
          <span class="badge cart-badge" style="display: none;">0</span>
        </a>
        <button class="mobile-menu-toggle" aria-label="Toggle menu" aria-expanded="false">
          ☰
        </button>
      </div>
    </div>
  </nav>

  <!-- Wishlist Page -->
  <main class="wishlist-page">
    <div class="container">
      <div class="wishlist-header">
        <h1>My Wishlist</h1>
      </div>
      
      <div id="wishlist-container">
        <!-- Wishlist items will be loaded here -->
        <div class="empty-wishlist">
          <div class="loader"></div>
          <p>Loading wishlist...</p>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-section">
          <h4>About TheBoys</h4>
          <p>Premium fashion store.</p>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2024 TheBoys Fashion Store. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script type="module" src="js/main.js"></script>
  <script type="module">
    import { loadProducts, renderProductCards } from './js/main.js';
    import { storage, showNotification } from './js/utils.js';
    
    const container = document.getElementById('wishlist-container');
    
   async function loadWishlist() {
  const wishlist = storage.get('wishlist') || [];

  if (wishlist.length === 0) {
    container.innerHTML = `
      <div class="empty-wishlist">
        <h2>Your wishlist is empty</h2>
        <p>Start adding items you love to your wishlist!</p>
        <a href="products.html" class="btn btn-primary">Browse Products</a>
      </div>
    `;
    return;
  }

  const wishlistProducts = wishlist;

  container.innerHTML = `
    <div class="products-grid" id="wishlist-grid"></div>
  `;

  renderProductCards(wishlistProducts, document.getElementById('wishlist-grid'));
}
    
    loadWishlist();
  </script>
</body>
</html>
