<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TheBoys Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#667eea,#764ba2);
}

/* Glass Card */

.login-card{
width:380px;
padding:40px;
border-radius:15px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
box-shadow:0 10px 30px rgba(0,0,0,0.3);
color:white;
}

/* Title */

.login-card h2{
text-align:center;
margin-bottom:10px;
font-weight:600;
}

.login-card p{
text-align:center;
font-size:14px;
margin-bottom:30px;
opacity:0.8;
}

/* Input Fields */

.input-group{
margin-bottom:20px;
}

.input-group label{
display:block;
font-size:14px;
margin-bottom:5px;
}

.input-group input{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.2);
color:white;
outline:none;
}

.input-group input::placeholder{
color:#eee;
}

/* Button */

.login-btn{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#ff7a18;
background:linear-gradient(45deg,#ff7a18,#ffb347);
color:white;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.login-btn:hover{
transform:scale(1.05);
}

/* Footer */

.footer{
margin-top:20px;
text-align:center;
font-size:14px;
}

.footer a{
color:#ffd369;
text-decoration:none;
}

.footer a:hover{
text-decoration:underline;
}

</style>
</head>
<body>

<div class="login-card">

<h2>TheBoys Store</h2>
<p>Login to continue shopping</p>

<form id="login-form">

<div class="input-group">
<label>Email</label>
<input type="email" id="email" placeholder="Enter your email" required>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="password" placeholder="Enter your password" required>
</div>

<button class="login-btn" type="submit">Login</button>
<a href="forget.html">Forgot Password?</a>

</form>

<div class="footer">
Don't have an account? <a href="signup.html">Sign Up</a>
</div>
<div>

  <!-- Footer -->
 <footer class="footer">
  <div class="container">
    <div class="footer-content">
      <div class="footer-section">
        <h4>About TheBoys</h4>
        <p>Premium fashion store.</p>
      </div>
    </div>
    <div class="footer-bottom">
      <p>&copy; 2024 TheBoys Fashion Store. All rights reserved.</p>
    </div>
  </div>
</footer>
 <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
document.getElementById("login-form").addEventListener("submit", async function(e){

  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    const response = await fetch("https://theboys-backend.onrender.com/api/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ email, password })
    });

    const data = await response.json();
    console.log("Login response:", data);

    const token = data.token || data.accessToken;

    if (token) {
      localStorage.setItem("token", token);

      Swal.fire({
        icon: 'success',
        title: 'Login Successful',
        text: 'Welcome back!',
        confirmButtonColor: '#6366f1'
      }).then(() => {
        window.location.href = "index.html";
      });

    } else {
      Swal.fire({
        icon: 'error',
        title: 'Login Failed',
        text: data.message || 'Invalid email or password',
        confirmButtonColor: '#ef4444'
      });
    }

  } catch (err) {
    console.log("❌ Fetch error:", err);

    Swal.fire({
      icon: 'error',
      title: 'Server Error',
      text: 'Cannot connect to backend'
    });
  }

}); // ✅ THIS WAS MISSING
</script>
</script>
</body>
</html>
