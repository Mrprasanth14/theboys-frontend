<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup - TheBoys</title>

  <!-- Styles (same as login) -->
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/responsive.css">

  <style>
    .auth-page {
      min-height: calc(100vh - 200px);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-container {
      max-width: 450px;
      width: 100%;
      background: var(--bg-primary);
      padding: 2rem;
      border-radius: 10px;
      box-shadow: var(--shadow-xl);
    }
    .form-group { margin-bottom: 1rem; }
    .form-input {
      width: 100%;
      padding: 10px;
      border: 2px solid #ccc;
      border-radius: 6px;
    }
    .btn { padding: 10px; cursor: pointer; }
    .btn-primary {
      background: #6366f1;
      color: white;
      border: none;
      width: 100%;
    }
    .auth-footer {
      text-align: center;
      margin-top: 1rem;
    }
  </style>
</head>

<body>

<main class="auth-page">
  <div class="auth-container">

    <div class="auth-header">
      <h1>Create Account</h1>
      <p>Join TheBoys Fashion Store</p>
    </div>

    <form id="signup-form">

      <div class="form-group">
        <label>Name</label>
        <input type="text" id="name" class="form-input" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" class="form-input" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" class="form-input" required>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="confirmPassword" class="form-input" required>
      </div>

      <button type="submit" class="btn btn-primary">Sign Up</button>

    </form>

    <div class="auth-footer">
      Already have an account?
      <a href="adminlogin.html">Login</a>
    </div>

  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
document.getElementById("signup-form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const confirmPassword = document.getElementById("confirmPassword").value.trim();

  // 🔥 Validation
  if(password !== confirmPassword){
    Swal.fire("Error", "Passwords do not match", "error");
    return;
  }

  try {
    const res = await fetch("http://localhost:3000/admin-signup", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ name, email, password })
    });

    const data = await res.json();

    if(data.success){
      Swal.fire("Success", "Account created!", "success")
        .then(() => window.location.href = "adminlogin.html");
    } else {
      Swal.fire("Error", data.message || "Signup failed", "error");
    }

  } catch (err) {
    Swal.fire("Error", "Server error", "error");
  }
});
</script>

</body>
</html>
