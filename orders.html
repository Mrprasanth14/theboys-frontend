<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Order history">
  <title>My Orders - TheBoys Fashion Store</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/responsive.css">
  
  <style>
    .orders-page {
      padding: var(--spacing-xl) 0;
    }
    
    .orders-header {
      margin-bottom: var(--spacing-xl);
    }
    
    .order-card {
      background: var(--bg-primary);
      border-radius: var(--border-radius);
      padding: var(--spacing-lg);
      margin-bottom: var(--spacing-md);
      box-shadow: var(--shadow-md);
    }
    
    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: var(--spacing-md);
      padding-bottom: var(--spacing-md);
      border-bottom: 1px solid var(--border-color);
      flex-wrap: wrap;
      gap: var(--spacing-md);
    }
    
    .order-info h3 {
      margin-bottom: var(--spacing-xs);
    }
    
    .order-meta {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }
    
    .order-status {
      padding: 0.5rem 1rem;
      border-radius: var(--border-radius-sm);
      font-size: 0.875rem;
      font-weight: 600;
    }
    
    .order-status.delivered {
      background: #d1fae5;
      color: #065f46;
    }
    
    .order-status.shipped {
      background: #dbeafe;
      color: #1e40af;
    }
    
    .order-status.processing {
      background: #fef3c7;
      color: #92400e;
    }
    
    .order-items {
      display: grid;
      gap: var(--spacing-md);
    }
    
    .order-item {
      display: grid;
      grid-template-columns: 100px 1fr auto;
      gap: var(--spacing-md);
      padding: var(--spacing-md);
      background: var(--bg-secondary);
      border-radius: var(--border-radius-sm);
    }
    
    .order-item-image {
      width: 100px;
      height: 100px;
      border-radius: var(--border-radius-sm);
      overflow: hidden;
    }
    
    .order-item-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .order-item-details h4 {
      margin-bottom: var(--spacing-xs);
      font-size: 1rem;
    }
    
    .order-item-meta {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }
    
    .order-item-price {
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
    }
    
    .order-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: var(--spacing-md);
      padding-top: var(--spacing-md);
      border-top: 1px solid var(--border-color);
      flex-wrap: wrap;
      gap: var(--spacing-md);
    }
    
    .order-total {
      font-size: 1.25rem;
      font-weight: 700;
      font-family: 'Poppins', sans-serif;
    }
    .order-box {
  border: 1px solid #ddd;
  border-radius: 8px;
  margin-bottom: 20px;
  background: #fff;
  overflow: hidden;
}

/* Top */
.order-top {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  background: #f7f7f7;
  padding: 12px 20px;
  font-size: 14px;
}

.label {
  font-size: 12px;
  color: #666;
}

/* Progress */
.progress-container {
  height: 6px;
  background: #eee;
}

.progress-bar {
  height: 100%;
  width: 30%;
  background: orange;
}

.progress-bar.shipped { width: 60%; background: #0073e6; }
.progress-bar.delivered { width: 100%; background: green; }

/* Delivery */
.delivery-info {
  padding: 10px 20px;
  font-size: 14px;
}

.delivered {
  color: green;
  font-weight: 600;
}

/* Items */
.order-body {
  padding: 15px 20px;
}

.order-row {
  display: grid;
  grid-template-columns: 80px 1fr auto auto;
  gap: 15px;
  align-items: center;
  margin-bottom: 15px;
}

.order-row img {
  width: 80px;
  height: 80px;
  object-fit: cover;
  border-radius: 6px;
}

.order-details h4 {
  margin: 0;
  font-size: 15px;
}

.order-details p {
  font-size: 13px;
  color: #777;
}

.order-price {
  font-weight: 600;
}

/* Mini button */
.order-actions-mini button {
  background: #ffd814;
  border: 1px solid #fcd200;
  padding: 6px 10px;
  cursor: pointer;
  font-size: 12px;
}

/* Bottom actions */
.order-actions {
  padding: 15px 20px;
  border-top: 1px solid #eee;
  display: flex;
  gap: 10px;
}

.btn-primary {
  background: #ffd814;
  border: 1px solid #fcd200;
  padding: 8px 14px;
  cursor: pointer;
}

.btn-outline {
  border: 1px solid #ccc;
  padding: 8px 14px;
  background: white;
  cursor: pointer;
}

/* Status colors */
.status.delivered { color: green; }
.status.shipped { color: #0073e6; }
.status.processing { color: orange; }
    
    .empty-orders {
      text-align: center;
      padding: var(--spacing-2xl);
    }
    
    @media (max-width: 768px) {
      .order-item {
        grid-template-columns: 80px 1fr;
      }
      
      .order-item-price {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="navbar-content">
      <a href="index.html" class="logo">TheBoys</a>
      
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html?category=men">Men</a></li>
        <li><a href="products.html?category=women">Women</a></li>
        <li><a href="products.html?category=kids">Kids</a></li>
        <li><a href="products.html">All Products</a></li>
      </ul>
      
      <div class="nav-actions">
        <button class="icon-btn" id="search-btn" aria-label="Search" onclick="window.location.href='search.html'">
          🔍
        </button>
        <button class="icon-btn" id="theme-toggle" aria-label="Toggle theme">
          🌙
        </button>
        <a href="wishlist.html" class="icon-btn" aria-label="Wishlist">
          ♡
        </a>
        <a href="cart.html" class="icon-btn" aria-label="Cart">
          🛒
          <span class="badge cart-badge" style="display: none;">0</span>

        <a href="orders.html" class="icon-btn" aria-label="Orders">

        </a>
        <a href="login.html" class="icon-btn" aria-label="Account">

        </a>
        <button class="mobile-menu-toggle" aria-label="Toggle menu" aria-expanded="false">
          ☰
        </button>
      </div>
    </div>
  </nav>

  <!-- Orders Page -->
  <main class="orders-page">
    <div class="container">
      <div class="orders-header">
        <h1>My Orders</h1>
        <p style="color: var(--text-secondary);">Track and manage your orders</p>
      </div>
      
      <div id="orders-container">
        <!-- Orders will be loaded here -->
        <div class="empty-orders">
          <div class="loader"></div>
          <p>Loading orders...</p>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-section">
          <h4>About TheBoys</h4>
          <p>Premium fashion store.</p>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2024 TheBoys Fashion Store. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script type="module" src="js/main.js"></script>
    <!-- import { formatPrice } from './js/utils.js'; -->
    <script>
window.buyAgain = function(productId) {
  fetch(`http://localhost:3000/api/cart/add`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ productId, quantity: 1 })
  })
  .then(() => alert("Added to cart!"));
};

window.trackOrder = function(orderId) {
  console.log("Tracking ID:", orderId);
  window.location.href = `track.html?id=${orderId}`;
};

window.downloadInvoice = function(orderId) {
  window.open(`http://localhost:3000/api/orders/${orderId}/invoice`);
};
   async function loadOrders() {
  const container = document.getElementById('orders-container');

  try {
    const token = localStorage.getItem("token");

    if (!token) {
      container.innerHTML = "<p>Please login first</p>";
      return;
    }

    const res = await fetch("https://theboys-backend.onrender.com/api/orders", {
      headers: {
        "Authorization": `Bearer ${token}`
      }
    });

    console.log("Response status:", res.status);

    if (!res.ok) {
      const text = await res.text();
      console.log("Server error:", text);
      throw new Error("API failed");
    }

    const data = await res.json();
    console.log("Full API data:", data);

    const orders = data.orders || data;

    if (!orders || orders.length === 0) {
      container.innerHTML = "<p>No orders found</p>";
      return;
    }

    container.innerHTML = "<h2>Orders Loaded Successfully ✅</h2>";

  } catch (err) {
    console.log("ERROR:", err);
    container.innerHTML = "<p>Server error loading orders</p>";
  }
}
  </script>
</body>
</html>
