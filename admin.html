<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Admin panel">
  <title>Admin Panel - TheBoys Fashion Store</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/responsive.css">
  
  <style>
    .admin-page {
      padding: var(--spacing-xl) 0;
      min-height: calc(100vh - 200px);
    }
    
    .admin-container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .admin-header {
      margin-bottom: var(--spacing-xl);
      padding-bottom: var(--spacing-md);
      border-bottom: 2px solid var(--border-color);
    }
    
    .admin-tabs {
      display: flex;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-lg);
      border-bottom: 2px solid var(--border-color);
    }
    
    .admin-tab {
      padding: var(--spacing-md) var(--spacing-lg);
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      font-weight: 500;
      color: var(--text-secondary);
      transition: var(--transition-fast);
    }
    
    .admin-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }
    
    .admin-content {
      display: none;
    }
    
    .admin-content.active {
      display: block;
    }
    
    .admin-card {
      background: var(--bg-primary);
      border-radius: var(--border-radius);
      padding: var(--spacing-lg);
      margin-bottom: var(--spacing-md);
      box-shadow: var(--shadow-md);
    }
    
    .product-form {
      display: grid;
      gap: var(--spacing-md);
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--spacing-md);
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-xl);
    }
    
    .stat-card {
      background: var(--bg-primary);
      padding: var(--spacing-lg);
      border-radius: var(--border-radius);
      box-shadow: var(--shadow-md);
      text-align: center;
    }
    
    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: var(--spacing-xs);
    }
    
    .stat-label {
      color: var(--text-secondary);
      font-size: 0.875rem;
    }
    
    .products-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: var(--spacing-md);
    }
    
    .products-table th,
    .products-table td {
      padding: var(--spacing-sm);
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }
    
    .products-table th {
      font-weight: 600;
      background: var(--bg-secondary);
    }
    
    .action-btn {
      padding: 0.25rem 0.75rem;
      margin-right: var(--spacing-xs);
      font-size: 0.875rem;
    }
    
    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }
      
      .admin-tabs {
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="navbar-content">
      <a href="index.html" class="logo">TheBoys</a>
      
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <!-- <li><a href="admin.html">Admin</a></li> -->
      </ul>
      
      <div class="nav-actions">
        <a href="index.html" class="btn btn-outline">Back to Store</a>
      </div>
    </div>
  </nav>

  <!-- Admin Page -->
  <main class="admin-page">
    <div class="container">
      <div class="admin-container">
        <div class="admin-header">
          <h1>Admin Panel</h1>
          <p style="color: var(--text-secondary);">Manage products, orders, and settings</p>
        </div>
        
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value" id="total-products">0</div>
            <div class="stat-label">Total Products</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="total-orders">0</div>
            <div class="stat-label">Total Orders</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" id="total-revenue">₹0</div>
            <div class="stat-label">Total Revenue</div>
          </div>
        </div>
        
        <div class="admin-tabs">
          <button class="admin-tab active" data-tab="products">Products</button>
          <button class="admin-tab" data-tab="add-product">Add Product</button>
          <button class="admin-tab" data-tab="orders">Orders</button>
        </div>
        
        <!-- Products Tab -->
        <div class="admin-content active" id="products-tab">
          <div class="admin-card">
            <h2>All Products</h2>
            <div id="products-list">
              <!-- Products will be loaded here -->
            </div>
          </div>
        </div>
        
        <!-- Add Product Tab -->
        <div class="admin-content" id="add-product-tab">
          <div class="admin-card">
            <h2>Add New Product</h2>
            <form id="add-product-form" class="product-form">
              <div class="form-row">
                <div class="form-group">
                  <label>Product Name</label>
                  <input type="text" class="form-input" id="product-name" required>
                </div>
                <div class="form-group">
                  <label>Brand</label>
                  <input type="text" class="form-input" id="product-brand" required>
                </div>
              </div>
              
              <div class="form-row">
                <div class="form-group">
                  <label>Price (₹)</label>
                  <input type="number" class="form-input" id="product-price" required>
                </div>
                <div class="form-group">
                  <label>Original Price (₹)</label>
                  <input type="number" class="form-input" id="product-original-price">
                </div>
              </div>
              
              <div class="form-row">
                <div class="form-group">
                  <label>Category</label>
                  <select class="form-input" id="product-category" required>
                    <option value="men">Men</option>
                    <option value="women">Women</option>
                    <option value="kids">Kids</option>
                  </select>
                </div>
                <div class="form-group">
                  <label>Rating</label>
                  <input type="number" class="form-input" id="product-rating" min="1" max="5" step="0.1" value="4.5">
                </div>
              </div>
              
              <div class="form-group">
                <label>Description</label>
                <textarea class="form-input" id="product-description" rows="3" required></textarea>
              </div>
              
              <div class="form-row">
                <div class="form-group">
                  <label>Sizes (comma separated)</label>
                  <input type="text" class="form-input" id="product-sizes" placeholder="S, M, L, XL" required>
                </div>
                <div class="form-group">
                  <label>Colors (comma separated)</label>
                  <input type="text" class="form-input" id="product-colors" placeholder="Black, White, Navy" required>
                </div>
              </div>
        <div class="form-group">
  <label>Collection</label>
  <select class="form-input" id="product-collection" required>
    <option value="1">New</option>
    <option value="2">Newtrands</option>
    <option value="3">Mensware</option>
  </select>
</div>

<div class="form-group">
  <label>Select Shop</label>
  <select class="form-input" id="shop-select" required>
    <option value="1">Shop 1</option>
    <option value="2">Shop 2</option>
    <option value="3">Shop 3</option>
  </select>
</div>

<div class="form-group">
  <label>Product Image</label>
  <input type="file" class="form-input" id="product-image" required>
</div>
<button type="submit" class="btn btn-primary">Add Product</button>
</form>
          </div>
        <!-- Orders Tab -->
        <div class="admin-content" id="orders-tab">
          <div class="admin-card">
            <h2>All Orders</h2>
            <div id="orderslist">
              <!-- Orders will be loaded here -->
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2024 TheBoys Fashion Store. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script type="module" src="js/main.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script type="module">
    import { loadProducts } from './js/main.js';
    import { storage, formatPrice, showNotification } from './js/utils.js';
    
    // Tab switching
    document.querySelectorAll('.admin-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const tabName = tab.dataset.tab;
        
        document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.admin-content').forEach(c => c.classList.remove('active'));
        
        tab.classList.add('active');
        document.getElementById(`${tabName}-tab`).classList.add('active');
        
        if (tabName === 'products') loadProductsList();
        if (tabName === 'orders') loadOrdersList();
      });
    });
    
    // Load stats
 async function loadStats() {
  try {
    // ✅ fetch from YOUR backend (not railway unless deployed)
    const productRes = await fetch("https://theboys-backend.onrender.com/api/products");
    const productData = await productRes.json();

    const orderRes = await fetch("https://theboys-backend.onrender.com/api/orders");
    const orderData = await orderRes.json();

    // ✅ handle both array & object response
    const products = Array.isArray(productData) ? productData : [];
    const orders = Array.isArray(orderData) ? orderData : [];

    console.log("Products:", products);
    console.log("Orders:", orders);

    // ✅ counts
    document.getElementById("total-products").textContent = products.length;
    document.getElementById("total-orders").textContent = orders.length;

    // ✅ revenue calculation
    let revenue = 0;
    orders.forEach(o => {
      revenue += Number(o.total) || 0;
    });

    document.getElementById("total-revenue").textContent = "₹" + revenue;

  } catch (err) {
    console.log("Stats error:", err);
  }
}
    // Load products list
    async function loadProductsList() {
      const products = await loadProducts();
      const container = document.getElementById('products-list');
      
      container.innerHTML = `
        <table class="products-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Brand</th>
              <th>Price</th>
              <th>Category</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody>
            ${products.map(p => `
              <tr>
                <td>${p.id}</td>
                <td>${p.name}</td>
                <td>${p.brand}</td>
                <td>${formatPrice(p.price)}</td>
                <td>${p.category}</td>
                <td>
                  <button class="btn btn-outline action-btn" onclick="editProduct(${p.id})">Edit</button>
                  <button class="btn btn-outline action-btn" onclick="deleteProduct(${p.id})">Delete</button>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    }
    
  //losdshops//
  async function loadShops() {
  const res = await fetch("https://theboys-backend.onrender.com/api/shops");
  const shops = await res.json();

  const shopEl = document.getElementById("shop-select");

if (!shopEl) {
  console.error("❌ shop-select NOT FOUND in DOM");
  return;
}
}
//loadorders//
async function loadOrdersList() {
  try {
    const response = await fetch("https://theboys-backend.onrender.com/api/orders");
    const orders = await response.json();

    console.log("Admin Orders:", orders);

    const container = document.getElementById("orderslist");

    if (!orders || orders.length === 0) {
      container.innerHTML = "<p>No orders found</p>";
      return;
    }
container.innerHTML = orders.map(order => `
  <div style="border:1px solid #ddd; padding:15px; margin-bottom:10px; border-radius:8px;">
    
    <h3>Order #${order.id}</h3>
    <p>Status: ${order.status}</p>
    <p>Total: ₹${order.total}</p>

    <h4>Items:</h4>
    ${
      order.items.length > 0
        ? order.items.map(item => `
            <div style="display:flex; gap:10px; margin-bottom:10px;">
              
              <img src="${item.image}" width="60" height="60"/>

              <div>
                <strong>${item.name}</strong><br>
                ${item.brand}<br>
                Qty: ${item.quantity}<br>
                ₹${item.price}
              </div>

            </div>
          `).join("")
        : "<p>No items</p>"
    }

  </div>
`).join("");

  } catch (err) {
    console.log(err);
  }
}   
const form = document.getElementById("add-product-form");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
   Swal.fire({
    title: 'Uploading Image...',
    text: 'Please wait',
    allowOutsideClick: false,
    didOpen: () => {
      Swal.showLoading();
    }
  });
  const btn = document.querySelector("button[type='submit']");
btn.disabled = true;
btn.textContent = "Processing...";

  const imageFile = document.getElementById("product-image").files[0];
if (!imageFile) {
  Swal.fire({
    icon: 'warning',
    title: 'No Image',
    text: 'Please select an image'
  });
  return;
}

  // Upload image to Cloudinary
  const formData = new FormData();
  formData.append("file", imageFile);
  formData.append("upload_preset", "the_boys"); // from Cloudinary dashboard
  formData.append("folder", "products"); // optional folder

  let imageUrl = "";
  try {
    const cloudRes = await fetch("https://api.cloudinary.com/v1_1/dc9eo14ft/image/upload", {
  method: "POST",
  body: formData
});

const cloudData = await cloudRes.json();

console.log("Cloudinary response:", cloudData);

if (!cloudData.secure_url) {
  Swal.close();
  Swal.fire({
    icon: 'error',
    title: 'Upload Failed',
    text: cloudData.error?.message || "Image upload failed"
  });
  return;
}

imageUrl = cloudData.secure_url;
console.log("FINAL IMAGE URL:", imageUrl);
    // 🔥 STEP 3: Update loading text
Swal.update({
  title: 'Saving Product...',
  html: 'Almost done...'
});
  } catch (err) {
    console.log("Cloudinary upload error", err);
    return alert("Image upload failed");
  }

  // Now send product data + image URL to backend
  
const shopEl = document.getElementById("shop-select");

console.log("Shop element:", shopEl); // DEBUG

if (!shopEl) {
  Swal.close();
  alert("Shop dropdown not found!");
  return;
}

const shopId = shopEl.value;
  const productData = {
    name: document.getElementById("product-name").value,
    brand: document.getElementById("product-brand").value,
    price: document.getElementById("product-price").value,
    original_price: document.getElementById("product-original-price").value,
    category: document.getElementById("product-category").value,
    description: document.getElementById("product-description").value,
    collection: document.getElementById("product-collection").value,
    sizes: document.getElementById("product-sizes").value,
    colors: document.getElementById("product-colors").value,
    image_url: imageUrl,
    shop_id:shopId
  };

  try {
    const res = await fetch("https://theboys-backend.onrender.com/add-product", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(productData)
    });
    const data = await res.json();

 if (data.success) {

  Swal.close();

  Swal.fire({
    icon: 'success',
    title: 'Product Added',
    timer: 1500,
    showConfirmButton: false
  });

  form.reset();
  loadProductsList();
  loadStats();

  btn.disabled = false;
  btn.textContent = "Add Product";
 }  else {

  Swal.close();

  Swal.fire({
    icon: 'error',
    title: 'Failed',
    text: data.message || "Something went wrong"
  });

  btn.disabled = false;
  btn.textContent = "Add Product";
}
  }
catch (err) {
  console.log(err);

  Swal.close();

  Swal.fire({
    icon: 'error',
    title: 'Server Error',
    text: 'Please try again'
  });

  btn.disabled = false;
  btn.textContent = "Add Product";
}
});
// delete
window.deleteProduct = async function(id){

const result = await Swal.fire({
  title: 'Delete Product?',
  text: "This product will be permanently removed.",
  icon: 'warning',
  showCancelButton: true,
  confirmButtonColor: '#ef4444',
  cancelButtonColor: '#6366f1',
  confirmButtonText: 'Yes, delete it!'
});

if (!result.isConfirmed) return;

try{

const response = await fetch(`https://theboys-backend.onrender.com/delete-product/${id}`,{
method:"DELETE"
});

const data = await response.json();

if(data.success){
Swal.fire({
  icon: 'success',
  title: 'Deleted!',
  text: 'Product removed successfully',
  confirmButtonColor: '#6366f1'
});

loadProductsList();
}else{
alert("Delete Failed");
}

}catch(err){
console.log(err);
}

}
//edit//
window.editProduct = async function(id){

const { value: formValues } = await Swal.fire({
  title: "Edit Product",
  html: `
    <input id="swal-name" class="swal2-input" placeholder="Product Name">
    <input id="swal-brand" class="swal2-input" placeholder="Brand">
    <input id="swal-price" type="number" class="swal2-input" placeholder="Price">
    <input id="swal-category" class="swal2-input" placeholder="Category">
    <input id="swal-description" class="swal2-input" placeholder="Description">
  `,
  focusConfirm: false,
  showCancelButton: true,
  confirmButtonText: "Update",
  preConfirm: () => {
    return {
      name: document.getElementById("swal-name").value,
      brand: document.getElementById("swal-brand").value,
      price: document.getElementById("swal-price").value,
      category: document.getElementById("swal-category").value,
      description: document.getElementById("swal-description").value
    }
  }
});

if (!formValues) return;

try{

const response = await fetch(`https://theboys-backend.onrender.com/update-product/${id}`,{

method:"PUT",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(formValues)

});

const data = await response.json();

if(data.success){

Swal.fire({
  icon: 'success',
  title: 'Product Updated',
  text: 'Product updated successfully!',
  confirmButtonColor: '#6366f1'
});

loadProductsList();

}else{

Swal.fire({
  icon: 'error',
  title: 'Update Failed',
  text: 'Could not update product'
});

}

}catch(err){
console.log(err);
}

}
document.addEventListener("DOMContentLoaded", () => {
  loadStats();
  loadProductsList();
  loadShops();
  loadOrdersList();
});
</script>
</body>
</html>
