<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Shopping cart">
  <title>Cart - TheBoys Fashion Store</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/responsive.css">
  
  <style>
    .cart-page {
      padding: var(--spacing-xl) 0;
    }
    
    .cart-container {
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: var(--spacing-xl);
    }
    
    .cart-items {
      background: var(--bg-primary);
      border-radius: var(--border-radius);
      padding: var(--spacing-md);
    }
    
    .cart-item {
      display: grid;
      grid-template-columns: 120px 1fr auto;
      gap: var(--spacing-md);
      padding: var(--spacing-md);
      border-bottom: 1px solid var(--border-color);
    }
    
    .cart-item:last-child {
      border-bottom: none;
    }
    
    .cart-item-image {
      width: 120px;
      height: 120px;
      border-radius: var(--border-radius-sm);
      overflow: hidden;
      background: var(--bg-secondary);
    }
    
    .cart-item-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .cart-item-details h4 {
      margin-bottom: var(--spacing-xs);
      font-size: 1rem;
    }
    
    .cart-item-brand {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-bottom: var(--spacing-xs);
    }
    
    .cart-item-variants {
      display: flex;
      gap: var(--spacing-md);
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-bottom: var(--spacing-xs);
    }
    
    .cart-item-price {
      font-size: 1.125rem;
      font-weight: 600;
      color: var(--text-primary);
      font-family: 'Poppins', sans-serif;
    }
    
    .cart-item-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: var(--spacing-md);
    }
    
    .quantity-controls {
      display: flex;
      align-items: center;
      border: 2px solid var(--border-color);
      border-radius: var(--border-radius-sm);
      overflow: hidden;
    }
    
    .qty-btn {
      width: 36px;
      height: 36px;
      background: var(--bg-secondary);
      border: none;
      cursor: pointer;
      font-size: 1.25rem;
      transition: var(--transition-fast);
    }
    
    .qty-btn:hover {
      background: var(--primary);
      color: white;
    }
    
    .qty-input {
      width: 50px;
      height: 36px;
      text-align: center;
      border: none;
      border-left: 1px solid var(--border-color);
      border-right: 1px solid var(--border-color);
      background: var(--bg-primary);
    }
    
    .remove-item-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--bg-secondary);
      border: none;
      cursor: pointer;
      font-size: 1.5rem;
      color: var(--text-secondary);
      transition: var(--transition-fast);
    }
    
    .remove-item-btn:hover {
      background: var(--secondary);
      color: white;
    }
    
    .cart-summary {
      background: var(--bg-primary);
      border-radius: var(--border-radius);
      padding: var(--spacing-lg);
      height: fit-content;
      position: sticky;
      top: 100px;
    }
    
    .cart-summary h2 {
      margin-bottom: var(--spacing-lg);
    }
    
    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: var(--spacing-md);
      padding-bottom: var(--spacing-md);
      border-bottom: 1px solid var(--border-color);
    }
    
    .summary-row.total {
      border-bottom: 2px solid var(--text-primary);
      font-size: 1.25rem;
      font-weight: 700;
      padding-top: var(--spacing-md);
    }
    
    .coupon-section {
      margin: var(--spacing-lg) 0;
      padding: var(--spacing-md);
      background: var(--bg-secondary);
      border-radius: var(--border-radius-sm);
    }
    
    .coupon-input-group {
      display: flex;
      gap: var(--spacing-xs);
      margin-top: var(--spacing-xs);
    }
    
    .coupon-input-group input {
      flex: 1;
      padding: 0.75rem;
      border: 2px solid var(--border-color);
      border-radius: var(--border-radius-sm);
      background: var(--bg-primary);
    }
    
    .coupon-input-group button {
      padding: 0.75rem 1.5rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--border-radius-sm);
      cursor: pointer;
    }
    
    .empty-cart {
      text-align: center;
      padding: var(--spacing-2xl);
    }
    
    .empty-cart h3 {
      margin-bottom: var(--spacing-md);
    }
    
    @media (max-width: 1024px) {
      .cart-container {
        grid-template-columns: 1fr;
      }
      
      .cart-summary {
        position: static;
      }
    }
    
    @media (max-width: 768px) {
      .cart-item {
        grid-template-columns: 100px 1fr;
      }
      
      .cart-item-actions {
        grid-column: 1 / -1;
        flex-direction: row;
        justify-content: space-between;
        margin-top: var(--spacing-sm);
      }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="navbar-content">
      <a href="index.html" class="logo">TheBoys</a>
      
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html?category=men">Men</a></li>
        <li><a href="products.html?category=women">Women</a></li>
        <li><a href="products.html?category=kids">Kids</a></li>
        <li><a href="products.html">All Products</a></li>
      </ul>
      
      <div class="nav-actions">
        <button class="icon-btn" id="search-btn" aria-label="Search" onclick="window.location.href='search.html'">
          🔍
        </button>
        <button class="icon-btn" id="theme-toggle" aria-label="Toggle theme">
          🌙
        </button>
        <a href="wishlist.html" class="icon-btn" aria-label="Wishlist">
          ♡
        </a>
        <a href="cart.html" class="icon-btn" aria-label="Cart">
          🛒
          <span class="badge cart-badge" style="display: none;">0</span>
        </a>
        <a href="login.html" class="icon-btn" aria-label="Account">
          👤
        </a>
        <button class="mobile-menu-toggle" aria-label="Toggle menu" aria-expanded="false">
          ☰
        </button>
      </div>
    </div>
  </nav>

  <!-- Cart Page -->
  <main class="cart-page">
    <div class="container">
      <h1 style="margin-bottom: var(--spacing-lg);">Shopping Cart</h1>
      
      <div class="cart-container">
        <div class="cart-items" id="cart-items">
          <!-- Cart items will be rendered here -->
        </div>
        
        <div class="cart-summary">
          <h2>Order Summary</h2>
          
          <div class="summary-row">
            <span>Subtotal</span>
            <span id="cart-subtotal">₹0</span>
          </div>
          
          <div class="summary-row">
            <span>Tax (GST 18%)</span>
            <span id="cart-tax">₹0</span>
          </div>
          
          <div class="summary-row">
            <span>Shipping</span>
            <span id="cart-shipping">₹99</span>
          </div>
          
          <div class="summary-row total">
            <span>Total</span>
            <span id="cart-total">₹0</span>
          </div>
          
          <div class="coupon-section">
            <label style="font-weight: 600; display: block; margin-bottom: var(--spacing-xs);">Coupon Code</label>
            <div class="coupon-input-group">
              <input type="text" id="coupon-input" placeholder="Enter code">
              <button id="apply-coupon">Apply</button>
            </div>
            <p id="coupon-message" style="margin-top: var(--spacing-xs); font-size: 0.875rem; color: var(--text-secondary);"></p>
          </div>
          
          <a href="checkout.html" class="btn btn-primary" style="width: 100%; margin-top: var(--spacing-lg); text-align: center; display: block;">
            Proceed to Checkout
          </a>
          
          <a href="products.html" style="display: block; text-align: center; margin-top: var(--spacing-md); color: var(--text-secondary);">
            Continue Shopping
          </a>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-section">
          <h4>About TheBoys</h4>
          <p>Premium fashion store.</p>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2024 TheBoys Fashion Store. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script type="module" src="js/main.js"></script>
  <script type="module">
    import { renderCartItems, updateCartSummary, applyCoupon } from './js/cart.js';
    import { showNotification } from './js/utils.js';
    
    // Render cart items
    renderCartItems(document.getElementById('cart-items'));
    updateCartSummary();
    
    // Apply coupon
    document.getElementById('apply-coupon').addEventListener('click', () => {
      const code = document.getElementById('coupon-input').value;
      const result = applyCoupon(code);
      const messageEl = document.getElementById('coupon-message');
      
      if (result.success) {
        messageEl.textContent = `Coupon applied! ${result.discount}% discount`;
        messageEl.style.color = '#10b981';
        showNotification('Coupon applied successfully!', 'success');
      } else {
        messageEl.textContent = result.message || 'Invalid coupon code';
        messageEl.style.color = '#ef4444';
        showNotification('Invalid coupon code', 'error');
      }
    });
    
    // Subscribe to cart changes
    import { cart } from './js/cart.js';
    cart.subscribe(() => {
      renderCartItems(document.getElementById('cart-items'));
      updateCartSummary();
    });
  </script>
</body>
</html>
